# HOPS default configuration
# Two-node heterogeneous example: two fast GPUs on node0, two slower GPUs on node1.

simulation:
  batches: 2
  microbatches: 8
  seed: 42

pipeline:
  schedule: 1f1b
  precision: bf16
  activation_mb: 50
  backward_factor: 2.0
  stages:
    - device: node0_gpu0
      weights_mb: 1792
      compute:
        mode: analytical
        tflop: 5.0
        memory_mb: 224.0
        efficiency:
          compute: 0.76
          memory: 0.88
        jitter: { type: normal, mean: 0.0, std: 0.10 }
    - device: node0_gpu1
      weights_mb: 1792
      compute:
        mode: analytical
        tflop: 5.0
        memory_mb: 224.0
        efficiency:
          compute: 0.76
          memory: 0.88
        jitter: { type: normal, mean: 0.0, std: 0.10 }
    - device: node1_gpu0
      weights_mb: 3072
      compute:
        mode: analytical
        tflop: 9.0
        memory_mb: 320.0
        efficiency:
          compute: 0.66
          memory: 0.78
        jitter: { type: normal, mean: 0.0, std: 0.18 }
    - device: node1_gpu1
      weights_mb: 3072
      compute:
        mode: analytical
        tflop: 9.0
        memory_mb: 320.0
        efficiency:
          compute: 0.66
          memory: 0.78
        jitter: { type: normal, mean: 0.0, std: 0.18 }

hardware:
  devices:
    - { id: node0_gpu0, gpu: h100, node: node0, socket: 0 }
    - { id: node0_gpu1, gpu: h100, node: node0, socket: 1 }
    - { id: node1_gpu0, gpu: a100, node: node1, socket: 0 }
    - { id: node1_gpu1, gpu: a100, node: node1, socket: 1 }
  interconnect:
    same_node: nvlink
    cross_node: infiniband

optimizer:
  enabled: true
  gradient_mb: 100
  accumulation_steps: 1
  allreduce:
    algorithm: naive
  update: { type: normal, mean: 2.0, std: 0.3 }

failure:
  enabled: false

output:
  timeline: output/timeline.png
  dashboard: output/dashboard.png
  summary_json: output/summary.json
  trace_csv: output/trace.csv
