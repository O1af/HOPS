# Analytical template for experiment_3 37_all_nodes_batch15.
# Purpose: full-cluster held-out long steady-state window.

simulation:
  batches: 10
  microbatches: 15
  seed: 42

pipeline:
  schedule: 1f1b
  precision: bf16
  backward_factor: 2.0
  model:
    hidden_dim: 1024
    seq_len: 1024
  stages:
    - device: h100_node0_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }
    - device: h100_node1_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }
    - device: a10g_node0_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }
    - device: a10g_node1_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }
    - device: l4_node0_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }
    - device: l4_node1_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }

hardware:
  devices:
    - { id: h100_node0_gpu0, gpu: h100, node: h100_node0, socket: 0 }
    - { id: h100_node1_gpu0, gpu: h100, node: h100_node1, socket: 0 }
    - { id: a10g_node0_gpu0, gpu: a10g, node: a10g_node0, socket: 0 }
    - { id: a10g_node1_gpu0, gpu: a10g, node: a10g_node1, socket: 0 }
    - { id: l4_node0_gpu0, gpu: l4, node: l4_node0, socket: 0 }
    - { id: l4_node1_gpu0, gpu: l4, node: l4_node1, socket: 0 }
  interconnect:
    same_node: pcie
    cross_node: ethernet

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
