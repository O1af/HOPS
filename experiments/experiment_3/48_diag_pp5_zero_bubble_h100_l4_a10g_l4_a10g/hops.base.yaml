# Analytical template for experiment_3 48_diag_pp5_zero_bubble_h100_l4_a10g_l4_a10g.
# Purpose: ZeroBubble diagnostic for PP5 depth edge.

simulation:
  batches: 10
  microbatches: 5
  seed: 42

pipeline:
  schedule: zero_bubble
  precision: bf16
  backward_factor: 2.0
  backward_split:
    enabled: true
    activation_grad_fraction: 0.5
  model:
    hidden_dim: 1024
    seq_len: 1024
  stages:
    - device: h100_node0_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }
    - device: l4_node0_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }
    - device: a10g_node0_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }
    - device: l4_node1_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }
    - device: a10g_node1_gpu0
      weights_mb: 2048
      compute: { mode: analytical, tflop: 0.06, memory_mb: 128 }

hardware:
  devices:
    - { id: h100_node0_gpu0, gpu: h100, node: h100_node0, socket: 0 }
    - { id: l4_node0_gpu0, gpu: l4, node: l4_node0, socket: 0 }
    - { id: a10g_node0_gpu0, gpu: a10g, node: a10g_node0, socket: 0 }
    - { id: l4_node1_gpu0, gpu: l4, node: l4_node1, socket: 0 }
    - { id: a10g_node1_gpu0, gpu: a10g, node: a10g_node1, socket: 0 }
  interconnect:
    same_node: pcie
    cross_node: ethernet

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
