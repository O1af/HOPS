# Analytical template for experiment_3 16_mixed_pp3_layers15.
# Purpose: PP3 held-out layer depth.

simulation:
  batches: 10
  microbatches: 5
  seed: 42

pipeline:
  schedule: 1f1b
  precision: bf16
  backward_factor: 2.0
  model:
    hidden_dim: 1024
    seq_len: 1024
  stages:
    - device: h100_node0_gpu0
      weights_mb: 5120
      compute: { mode: analytical, tflop: 0.15, memory_mb: 320 }
    - device: l4_node0_gpu0
      weights_mb: 5120
      compute: { mode: analytical, tflop: 0.15, memory_mb: 320 }
    - device: a10g_node0_gpu0
      weights_mb: 5120
      compute: { mode: analytical, tflop: 0.15, memory_mb: 320 }

hardware:
  devices:
    - { id: h100_node0_gpu0, gpu: h100, node: h100_node0, socket: 0 }
    - { id: l4_node0_gpu0, gpu: l4, node: l4_node0, socket: 0 }
    - { id: a10g_node0_gpu0, gpu: a10g, node: a10g_node0, socket: 0 }
  interconnect:
    same_node: pcie
    cross_node: ethernet

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
