# Analytical template for experiment_3 20_g_only_hidden1280_pp4.
# Purpose: G-only PP4 held-out hidden width.

simulation:
  batches: 10
  microbatches: 5
  seed: 42

pipeline:
  schedule: 1f1b
  precision: bf16
  backward_factor: 2.0
  model:
    hidden_dim: 1280
    seq_len: 1024
  stages:
    - device: l4_node0_gpu0
      weights_mb: 4800
      compute: { mode: analytical, tflop: 0.140625, memory_mb: 300 }
    - device: a10g_node0_gpu0
      weights_mb: 4800
      compute: { mode: analytical, tflop: 0.140625, memory_mb: 300 }
    - device: l4_node1_gpu0
      weights_mb: 4800
      compute: { mode: analytical, tflop: 0.140625, memory_mb: 300 }
    - device: a10g_node1_gpu0
      weights_mb: 4800
      compute: { mode: analytical, tflop: 0.140625, memory_mb: 300 }

hardware:
  devices:
    - { id: l4_node0_gpu0, gpu: l4, node: l4_node0, socket: 0 }
    - { id: a10g_node0_gpu0, gpu: a10g, node: a10g_node0, socket: 0 }
    - { id: l4_node1_gpu0, gpu: l4, node: l4_node1, socket: 0 }
    - { id: a10g_node1_gpu0, gpu: a10g, node: a10g_node1, socket: 0 }
  interconnect:
    same_node: pcie
    cross_node: ethernet

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
