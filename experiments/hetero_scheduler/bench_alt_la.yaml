simulation:
  batches: 1
  microbatches: 16
  seed: 42

pipeline:
  schedule: zero_bubble
  precision: bf16
  backward_factor: 2.0
  model:
    hidden_dim: 1024
    seq_len: 1024
  stages:
    - device: l4_n0_g0
      weights_mb: 6144
      compute: { mode: analytical, tflop: 0.18, memory_mb: 384.0 }
    - device: a10g_n1_g0
      weights_mb: 6144
      compute: { mode: analytical, tflop: 0.18, memory_mb: 384.0 }
    - device: l4_n2_g0
      weights_mb: 6144
      compute: { mode: analytical, tflop: 0.18, memory_mb: 384.0 }
    - device: a10g_n3_g0
      weights_mb: 6144
      compute: { mode: analytical, tflop: 0.18, memory_mb: 384.0 }

hardware:
  devices:
    - { id: l4_n0_g0, gpu: l4, node: l4_n0, socket: 0 }
    - { id: a10g_n1_g0, gpu: a10g, node: a10g_n1, socket: 0 }
    - { id: l4_n2_g0, gpu: l4, node: l4_n2, socket: 0 }
    - { id: a10g_n3_g0, gpu: a10g, node: a10g_n3, socket: 0 }
  interconnect:
    same_node: pcie
    cross_node: ethernet

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
