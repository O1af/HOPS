# Max cluster footprint:
# - Head node: 1 x c6i.large = 2 vCPUs, no GPU
# - fast-gpu: 1 x p5.4xlarge = 1 H100, 16 vCPUs total
# - Max cluster total = 1 H100, 18 vCPUs including head
#
# Intended use:
# - smoke-test Megatron tracing and HOPS conversion with a single H100
# - PP=1 / 1 GPU runs such as experiments/06_h100_single_gpu_smoke
#
# Replace the reservation id below with your active 1-instance Capacity Block
# reservation before creating the cluster.
#
# Example target:
# - AZ: us-east-1f
# - Instance type: p5.4xlarge

Region: us-east-1

Image:
  Os: ubuntu2204

HeadNode:
  InstanceType: c6i.large
  Ssh:
    KeyName: megatron-key
  Networking:
    # Public subnet in us-east-1f
    SubnetId: subnet-04fe51f1ae403287c

Scheduling:
  Scheduler: slurm
  SlurmQueues:
    - Name: fast-gpu
      CapacityType: CAPACITY_BLOCK
      Networking:
        # Private subnet in us-east-1f
        SubnetIds:
          - subnet-0cbde9e3f3572b04b
        AssignPublicIp: false
      ComputeResources:
        - Name: p5small
          # Per node: p5.4xlarge = 1 x H100, 16 vCPUs
          InstanceType: p5.4xlarge
          MinCount: 1
          MaxCount: 1
          CapacityReservationTarget:
            CapacityReservationId: cr-01fcac74f975b54ba
