# Initial calibration template for a 2-stage H100-only pipeline.
# Replace the explicit distribution means/std values after collecting real logs.

simulation:
  batches: 4
  microbatches: 8
  seed: 42

pipeline:
  schedule: 1f1b
  precision: bf16
  activation_mb: 64
  backward_factor: 2.0
  stages:
    - device: h100_gpu0
      weights_mb: 4096
      compute:
        mode: explicit
        distribution: { type: normal, mean: 22.0, std: 1.5 }
    - device: h100_gpu1
      weights_mb: 4096
      compute:
        mode: explicit
        distribution: { type: normal, mean: 22.0, std: 1.5 }

hardware:
  devices:
    - { id: h100_gpu0, gpu: h100, node: p5_node, socket: 0 }
    - { id: h100_gpu1, gpu: h100, node: p5_node, socket: 1 }
  interconnect:
    same_node: nvlink
    cross_node: infiniband

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
