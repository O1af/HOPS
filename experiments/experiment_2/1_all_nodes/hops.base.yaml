# Analytical template for the 6-GPU experiment_2 pipeline:
# 2 x p5.4xlarge H100, 2 x g5.2xlarge A10G, 2 x g6.4xlarge L4.
# run.slurm orders stages as H100,H100,A10G,A10G,L4,L4.

simulation:
  batches: 10
  microbatches: 6
  seed: 42

pipeline:
  schedule: 1f1b
  precision: bf16
  backward_factor: 2.0
  model:
    hidden_dim: 1024
    seq_len: 1024
  stages:
    - device: h100_node0_gpu0
      weights_mb: 2048
      compute:
        mode: analytical
        tflop: 0.06
        memory_mb: 128.0
    - device: h100_node1_gpu0
      weights_mb: 2048
      compute:
        mode: analytical
        tflop: 0.06
        memory_mb: 128.0
    - device: a10g_node0_gpu0
      weights_mb: 2048
      compute:
        mode: analytical
        tflop: 0.06
        memory_mb: 128.0
    - device: a10g_node1_gpu0
      weights_mb: 2048
      compute:
        mode: analytical
        tflop: 0.06
        memory_mb: 128.0
    - device: l4_node0_gpu0
      weights_mb: 2048
      compute:
        mode: analytical
        tflop: 0.06
        memory_mb: 128.0
    - device: l4_node1_gpu0
      weights_mb: 2048
      compute:
        mode: analytical
        tflop: 0.06
        memory_mb: 128.0

hardware:
  devices:
    - { id: h100_node0_gpu0, gpu: h100, node: h100_node0, socket: 0 }
    - { id: h100_node1_gpu0, gpu: h100, node: h100_node1, socket: 0 }
    - { id: a10g_node0_gpu0, gpu: a10g, node: a10g_node0, socket: 0 }
    - { id: a10g_node1_gpu0, gpu: a10g, node: a10g_node1, socket: 0 }
    - { id: l4_node0_gpu0, gpu: l4, node: l4_node0, socket: 0 }
    - { id: l4_node1_gpu0, gpu: l4, node: l4_node1, socket: 0 }
  interconnect:
    same_node: pcie
    cross_node: ethernet

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
