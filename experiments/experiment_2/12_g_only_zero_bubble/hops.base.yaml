# Analytical template for experiment_2 G-family-only PP4 baseline using the ZeroBubble scheduler.

simulation:
  batches: 10
  microbatches: 4
  seed: 42

pipeline:
  schedule: zero_bubble
  precision: bf16
  backward_factor: 2.0
  backward_split:
    enabled: true
    activation_grad_fraction: 0.5
  model:
    hidden_dim: 1024
    seq_len: 1024
  stages:
    - device: a10g_node0_gpu0
      weights_mb: 3072
      compute: { mode: analytical, tflop: 0.09, memory_mb: 192.0 }
    - device: a10g_node1_gpu0
      weights_mb: 3072
      compute: { mode: analytical, tflop: 0.09, memory_mb: 192.0 }
    - device: l4_node0_gpu0
      weights_mb: 3072
      compute: { mode: analytical, tflop: 0.09, memory_mb: 192.0 }
    - device: l4_node1_gpu0
      weights_mb: 3072
      compute: { mode: analytical, tflop: 0.09, memory_mb: 192.0 }

hardware:
  devices:
    - { id: a10g_node0_gpu0, gpu: a10g, node: a10g_node0, socket: 0 }
    - { id: a10g_node1_gpu0, gpu: a10g, node: a10g_node1, socket: 0 }
    - { id: l4_node0_gpu0, gpu: l4, node: l4_node0, socket: 0 }
    - { id: l4_node1_gpu0, gpu: l4, node: l4_node1, socket: 0 }
  interconnect:
    same_node: pcie
    cross_node: ethernet

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
