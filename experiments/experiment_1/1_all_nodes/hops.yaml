# Initial analytical template for a 4-stage G-family heterogeneous pipeline.
# This mirrors run.slurm: 8 transformer layers, PP=4, hidden=1024, seq=1024,
# micro-batch size 1. Activation size is derived from the model block.
# Replace analytical tflop/memory estimates with measured distributions after
# collecting real Megatron logs if you need calibrated replay mode.

simulation:
  batches: 10
  microbatches: 4
  seed: 42

pipeline:
  schedule: 1f1b
  precision: bf16
  backward_factor: 2.0
  model:
    hidden_dim: 1024
    seq_len: 1024
  stages:
    - device: a10g_node0_gpu0
      weights_mb: 2048
      compute:
        mode: analytical
        # Rough forward-pass work for 2 GPT-style layers at hidden=1024, seq=1024.
        # Efficiency omitted intentionally; HOPS applies the default analytical
        # compute/memory efficiency until measured calibration data exists.
        tflop: 0.06
        memory_mb: 128.0
    - device: a10g_node1_gpu0
      weights_mb: 2048
      compute:
        mode: analytical
        tflop: 0.06
        memory_mb: 128.0
    - device: l4_node0_gpu0
      weights_mb: 2048
      compute:
        mode: analytical
        tflop: 0.06
        memory_mb: 128.0
    - device: l4_node1_gpu0
      weights_mb: 2048
      compute:
        mode: analytical
        tflop: 0.06
        memory_mb: 128.0

hardware:
  devices:
    - { id: a10g_node0_gpu0, gpu: a10g, node: a10g_node0, socket: 0 }
    - { id: a10g_node1_gpu0, gpu: a10g, node: a10g_node1, socket: 0 }
    - { id: l4_node0_gpu0, gpu: l4, node: l4_node0, socket: 0 }
    - { id: l4_node1_gpu0, gpu: l4, node: l4_node1, socket: 0 }
  interconnect:
    same_node: pcie
    cross_node: ethernet

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
