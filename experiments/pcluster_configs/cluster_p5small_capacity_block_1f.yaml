# Max cluster footprint:
# - Head node: 1 x c6i.large = 2 vCPUs, no GPU
# - fast-gpu: 2 x p5.4xlarge = 2 H100, 32 vCPUs total
# - Max cluster total = 2 H100, 34 vCPUs including head
# Capacity reservation target:
# - Capacity block reservation id: cr-07d110b7c381cbe48
# - AZ: us-east-1f

Region: us-east-1

Image:
  Os: ubuntu2204

HeadNode:
  # Head node only: c6i.large = 2 vCPUs, no GPU
  InstanceType: c6i.large
  Ssh:
    KeyName: megatron-key
  Networking:
    # Public subnet in us-east-1f
    SubnetId: subnet-04fe51f1ae403287c

Scheduling:
  Scheduler: slurm
  SlurmQueues:
    - Name: fast-gpu
      CapacityType: CAPACITY_BLOCK
      Networking:
        # Private subnet in us-east-1f
        SubnetIds:
          - subnet-0cbde9e3f3572b04b
        AssignPublicIp: false
      ComputeResources:
        - Name: p5small
          # Per node: p5.4xlarge = 1 x H100, 16 vCPUs
          InstanceType: p5.4xlarge
          MinCount: 2
          MaxCount: 2
          CapacityReservationTarget:
            CapacityReservationId: cr-07d110b7c381cbe48
