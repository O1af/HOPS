# Initial calibration template for a 4-stage heterogeneous pipeline with a weighted split.
# H100 stages carry more model weight so that per-stage latency is closer to the A100 stages.
# Replace the stage means/std values after collecting real logs.

simulation:
  batches: 4
  microbatches: 8
  seed: 42

pipeline:
  schedule: 1f1b
  precision: bf16
  activation_mb: 64
  backward_factor: 2.0
  stages:
    - device: h100_gpu0
      weights_mb: 5120
      compute:
        mode: explicit
        distribution: { type: normal, mean: 27.0, std: 1.8 }
    - device: h100_gpu1
      weights_mb: 5120
      compute:
        mode: explicit
        distribution: { type: normal, mean: 27.0, std: 1.8 }
    - device: a100_gpu0
      weights_mb: 3072
      compute:
        mode: explicit
        distribution: { type: normal, mean: 24.0, std: 1.8 }
    - device: a100_gpu1
      weights_mb: 3072
      compute:
        mode: explicit
        distribution: { type: normal, mean: 24.0, std: 1.8 }

hardware:
  devices:
    - { id: h100_gpu0, gpu: h100, node: p5_node, socket: 0 }
    - { id: h100_gpu1, gpu: h100, node: p5_node, socket: 1 }
    - { id: a100_gpu0, gpu: a100, node: p4d_node, socket: 0 }
    - { id: a100_gpu1, gpu: a100, node: p4d_node, socket: 1 }
  interconnect:
    same_node: nvlink
    cross_node: infiniband

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
