# Analytical template for experiment_3 45_diag_g_only_gpipe_l4_a10g_l4_a10g_pp4.
# Purpose: GPipe diagnostic on held-out G-family PP4 order.

simulation:
  batches: 10
  microbatches: 4
  seed: 42

pipeline:
  schedule: gpipe
  precision: bf16
  backward_factor: 2.0
  model:
    hidden_dim: 1024
    seq_len: 1024
  stages:
    - device: l4_node0_gpu0
      weights_mb: 3072
      compute: { mode: analytical, tflop: 0.09, memory_mb: 192 }
    - device: a10g_node0_gpu0
      weights_mb: 3072
      compute: { mode: analytical, tflop: 0.09, memory_mb: 192 }
    - device: l4_node1_gpu0
      weights_mb: 3072
      compute: { mode: analytical, tflop: 0.09, memory_mb: 192 }
    - device: a10g_node1_gpu0
      weights_mb: 3072
      compute: { mode: analytical, tflop: 0.09, memory_mb: 192 }

hardware:
  devices:
    - { id: l4_node0_gpu0, gpu: l4, node: l4_node0, socket: 0 }
    - { id: a10g_node0_gpu0, gpu: a10g, node: a10g_node0, socket: 0 }
    - { id: l4_node1_gpu0, gpu: l4, node: l4_node1, socket: 0 }
    - { id: a10g_node1_gpu0, gpu: a10g, node: a10g_node1, socket: 0 }
  interconnect:
    same_node: pcie
    cross_node: ethernet

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
