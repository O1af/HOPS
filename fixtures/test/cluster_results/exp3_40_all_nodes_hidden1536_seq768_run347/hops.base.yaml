# Analytical template for experiment_3 40_all_nodes_hidden1536_seq768.
# Purpose: full-cluster mixed hidden and sequence scale.

simulation:
  batches: 10
  microbatches: 6
  seed: 42

pipeline:
  schedule: 1f1b
  precision: bf16
  backward_factor: 2.0
  model:
    hidden_dim: 1536
    seq_len: 768
  stages:
    - device: h100_node0_gpu0
      weights_mb: 4608
      compute: { mode: analytical, tflop: 0.10125, memory_mb: 216 }
    - device: h100_node1_gpu0
      weights_mb: 4608
      compute: { mode: analytical, tflop: 0.10125, memory_mb: 216 }
    - device: a10g_node0_gpu0
      weights_mb: 4608
      compute: { mode: analytical, tflop: 0.10125, memory_mb: 216 }
    - device: a10g_node1_gpu0
      weights_mb: 4608
      compute: { mode: analytical, tflop: 0.10125, memory_mb: 216 }
    - device: l4_node0_gpu0
      weights_mb: 4608
      compute: { mode: analytical, tflop: 0.10125, memory_mb: 216 }
    - device: l4_node1_gpu0
      weights_mb: 4608
      compute: { mode: analytical, tflop: 0.10125, memory_mb: 216 }

hardware:
  devices:
    - { id: h100_node0_gpu0, gpu: h100, node: h100_node0, socket: 0 }
    - { id: h100_node1_gpu0, gpu: h100, node: h100_node1, socket: 0 }
    - { id: a10g_node0_gpu0, gpu: a10g, node: a10g_node0, socket: 0 }
    - { id: a10g_node1_gpu0, gpu: a10g, node: a10g_node1, socket: 0 }
    - { id: l4_node0_gpu0, gpu: l4, node: l4_node0, socket: 0 }
    - { id: l4_node1_gpu0, gpu: l4, node: l4_node1, socket: 0 }
  interconnect:
    same_node: pcie
    cross_node: ethernet

optimizer:
  enabled: false

failure:
  enabled: false

output: {}
